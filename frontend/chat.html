<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GreenMart Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --forest: #1B4332;
    --leaf: #52B788;
    --leaf-light: #B7E4C7;
    --paper: #FFFCF3;
    --ink: #22292B;
    --gold: #E9C46A;
    --line: #D8D2C2;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--paper);
    font-family: 'Inter', sans-serif;
  }
  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* ---------- HEADER ---------- */
  .app-header {
    background: var(--forest);
    color: var(--paper);
    padding: 18px clamp(20px, 4vw, 48px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    z-index: 2;
  }
  .app-header .left { display: flex; align-items: center; gap: 14px; }
  .avatar {
    width: 40px; height: 40px;
    border-radius: 10px;
    background: var(--leaf);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Archivo Black', sans-serif;
    color: var(--forest);
    font-size: 16px;
  }
  .app-header h1 {
    font-family: 'Archivo Black', sans-serif;
    font-size: 17px;
    letter-spacing: -0.3px;
  }
  .app-header .status {
    font-size: 12px;
    color: var(--leaf-light);
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 2px;
  }
  .status .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #6FCF97;
  }
  .back-link {
    font-size: 13px;
    color: var(--leaf-light);
    text-decoration: none;
    border: 1px solid rgba(255,255,255,0.25);
    padding: 8px 16px;
    border-radius: 8px;
  }
  .back-link:hover { background: rgba(255,255,255,0.08); }

  /* ---------- MESSAGE AREA ---------- */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 32px clamp(16px, 6vw, 0);
    display: flex;
    justify-content: center;
  }
  .chat-inner {
    width: 100%;
    max-width: 720px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  .row { display: flex; }
  .row.user { justify-content: flex-end; }
  .row.assistant { justify-content: flex-start; }

  .bubble {
    max-width: 72%;
    padding: 14px 18px;
    border-radius: 16px;
    font-size: 15px;
    line-height: 1.55;
  }
  .row.user .bubble {
    background: var(--forest);
    color: var(--paper);
    border-bottom-right-radius: 4px;
  }
  .row.assistant .bubble {
    background: white;
    color: var(--ink);
    border: 1px solid var(--line);
    border-bottom-left-radius: 4px;
  }
  .intent-pill {
    display: inline-block;
    margin-top: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 10.5px;
    color: var(--forest);
    background: var(--leaf-light);
    padding: 3px 9px;
    border-radius: 100px;
    letter-spacing: 0.3px;
  }

  .typing {
    display: flex;
    gap: 4px;
    padding: 16px 18px;
  }
  .typing span {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--leaf);
    animation: bounce 1.2s infinite ease-in-out;
  }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  /* ---------- SUGGESTED PROMPTS (first load only) ---------- */
  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 6px;
  }
  .suggestion {
    background: white;
    border: 1px solid var(--line);
    color: var(--forest);
    font-size: 13px;
    padding: 10px 16px;
    border-radius: 10px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .suggestion:hover { border-color: var(--leaf); }

  /* ---------- INPUT BAR ---------- */
  .input-bar {
    border-top: 1px solid var(--line);
    background: white;
    padding: 18px clamp(16px, 6vw, 0);
    display: flex;
    justify-content: center;
  }
  .input-inner {
    width: 100%;
    max-width: 720px;
    display: flex;
    gap: 10px;
  }
  .input-inner input {
    flex: 1;
    border: 1.5px solid var(--line);
    border-radius: 12px;
    padding: 14px 18px;
    font-size: 15px;
    outline: none;
    font-family: 'Inter', sans-serif;
  }
  .input-inner input:focus { border-color: var(--leaf); }
  .input-inner button {
    background: var(--forest);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 0 26px;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
  }
  .input-inner button:disabled { opacity: 0.5; }

  @media (max-width: 600px) {
    .bubble { max-width: 85%; }
  }
</style>
</head>
<body>

<div class="app">
  <header class="app-header">
    <div class="left">
      <div class="avatar">GM</div>
      <div>
        <h1>GreenMart Assistant</h1>
        <div class="status"><span class="dot"></span> Online</div>
      </div>
    </div>
    <a href="index.html" class="back-link">← Back to store</a>
  </header>

  <div class="chat-area">
    <div class="chat-inner" id="chatInner">
      <div class="row assistant">
        <div>
          <div class="bubble">Hi! I'm the GreenMart assistant. Ask me about products, hours, promotions, or store policies.</div>
          <div class="suggestions" id="suggestions">
            <div class="suggestion">Do you have organic milk?</div>
            <div class="suggestion">What are your opening hours?</div>
            <div class="suggestion">Any promotions this week?</div>
            <div class="suggestion">What's your return policy?</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="input-bar">
    <div class="input-inner">
      <input id="userInput" type="text" placeholder="Message GreenMart Assistant..." />
      <button id="sendBtn">Send</button>
    </div>
  </div>
</div>

<script>
  const API_URL = "/api/chat";
  const chatInner = document.getElementById("chatInner");
  const inputEl = document.getElementById("userInput");
  const sendBtn = document.getElementById("sendBtn");
  const suggestionsEl = document.getElementById("suggestions");
  let history = [];

  function addRow(role, content, intent) {
    const row = document.createElement("div");
    row.className = "row " + role;
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = content;
    const wrap = document.createElement("div");
    wrap.appendChild(bubble);
    if (intent) {
      const pill = document.createElement("div");
      pill.className = "intent-pill";
      pill.textContent = intent.replace(/_/g, " ");
      wrap.appendChild(pill);
    }
    row.appendChild(wrap);
    chatInner.appendChild(row);
    chatInner.parentElement.scrollTop = chatInner.parentElement.scrollHeight;
  }

  function showTyping() {
    const row = document.createElement("div");
    row.className = "row assistant";
    row.id = "typingRow";
    row.innerHTML = '<div class="bubble typing"><span></span><span></span><span></span></div>';
    chatInner.appendChild(row);
    chatInner.parentElement.scrollTop = chatInner.parentElement.scrollHeight;
  }
  function removeTyping() {
    const el = document.getElementById("typingRow");
    if (el) el.remove();
  }

  async function sendMessage(text) {
    const message = (text !== undefined ? text : inputEl.value).trim();
    if (!message) return;
    if (suggestionsEl) { suggestionsEl.remove(); }

    addRow("user", message);
    history.push({ role: "user", content: message });
    inputEl.value = "";
    sendBtn.disabled = true;
    showTyping();

    try {
      const response = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: message, history: history.slice(0, -1) }),
      });
      const data = await response.json();
      removeTyping();
      addRow("assistant", data.reply, data.intent);
      history.push({ role: "assistant", content: data.reply });
    } catch (err) {
      removeTyping();
      addRow("assistant", "I'm having trouble connecting right now — please try again in a moment.");
      console.error(err);
    } finally {
      sendBtn.disabled = false;
    }
  }

  sendBtn.addEventListener("click", () => sendMessage());
  inputEl.addEventListener("keydown", (e) => { if (e.key === "Enter") sendMessage(); });
  document.querySelectorAll(".suggestion").forEach(el => {
    el.addEventListener("click", () => sendMessage(el.textContent));
  });
</script>

</body>
</html>
